spring:
  application:
    name: ai-resume-coach

  datasource:
    url: jdbc:mysql://localhost:3306/airesume?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:airesume}
    password: ${MYSQL_PASSWORD:airesume123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:my-very-secret-jwt-key-for-ai-resume-coach-2026-change-me-in-production}
  expiration-ms: ${JWT_EXPIRATION:86400000} # 24 hours

# AI Configuration
ai:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:google/gemini-3-flash-preview}
    gateway-url: ${AI_GATEWAY_URL:https://ai.gateway.lovable.dev/v1/chat/completions}

# File Storage
storage:
  upload-dir: ${UPLOAD_DIR:uploads}

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

